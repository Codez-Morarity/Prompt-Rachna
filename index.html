<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.R.A.G.A.I Boot Sequence</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/load.css">
</head>

<body>

    <div class="loader-container">
        <!-- Complex spinning SVG HUD graphics -->
        <svg class="hud-spin" viewBox="0 0 100 100">
            <circle class="hud-circle-1" cx="50" cy="50" r="45" fill="none" stroke="#0ff" stroke-width="1"
                stroke-dasharray="10 5" />
            <circle class="hud-circle-2" cx="50" cy="50" r="35" fill="none" stroke="#ff3366" stroke-width="2"
                stroke-dasharray="20 10 5 10" />
            <circle class="hud-circle-3" cx="50" cy="50" r="25" fill="none" stroke="#fff" stroke-width="1"
                stroke-dasharray="4" />
        </svg>

        <div class="text-data">
            <div id="progress-text">0%</div>
            <div class="terminal-logs">
                <p id="log-1">> INITIALIZING QUANTUM KERNEL...</p>
                <p id="log-2">> BYPASSING NEURAL SAFEGUARDS...</p>
                <p id="log-3">> ESTABLISHING GLOBAL CONNECTION...</p>
            </div>
        </div>

        <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
        </div>
    </div>

    <!-- GSAP for robust animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="js/load.js"></script>
</body>

</html>
